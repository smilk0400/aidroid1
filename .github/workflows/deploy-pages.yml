name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/threejs-3d-main-page-pl8i2z
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pages 가 아직 켜져 있지 않으면 자동으로 활성화 (source = GitHub Actions)
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # 정적 사이트(리포지토리 루트: index.html + src/ + vendor/)를 아티팩트로 업로드
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
