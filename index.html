<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aicrea · 매출채널별 손익 3D 대시보드</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%235b8cff'/%3E%3Crect x='7' y='16' width='4' height='9' fill='%23fff'/%3E%3Crect x='14' y='10' width='4' height='15' fill='%23fff'/%3E%3Crect x='21' y='13' width='4' height='12' fill='%23fff'/%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #ffffff; --fg: #1b2230; --muted: #6b7686;
      --pos: #1f9d57; --neg: #e5484d; --card: rgba(255, 255, 255, 0.82);
      --line: rgba(20, 30, 50, 0.12);
      --shadow: 0 4px 18px rgba(20, 30, 50, 0.08);
    }
    * { box-sizing: border-box; margin: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--fg); overflow: hidden;
      font-family: 'Pretendard', system-ui, -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    #stage { position: fixed; inset: 0; }
    .label-layer { position: absolute; inset: 0; pointer-events: none; }
    canvas { display: block; }

    /* 헤더 */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; padding: 22px 28px;
      display: flex; justify-content: space-between; align-items: flex-start;
      pointer-events: none; z-index: 10;
    }
    .brand { pointer-events: auto; }
    .brand h1 {
      font-size: 22px; letter-spacing: -0.5px; font-weight: 800;
      display: flex; align-items: center; gap: 10px;
    }
    .brand h1 .mark {
      width: 12px; height: 12px; border-radius: 4px;
      background: linear-gradient(135deg, #7f9bd6, #a9b3c4);
      box-shadow: 0 2px 6px rgba(20, 30, 50, 0.15);
    }
    .brand p { color: var(--muted); font-size: 12.5px; margin-top: 4px; }

    #kpi { display: flex; gap: 14px; pointer-events: auto; }
    #kpi .k {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 12px; padding: 10px 16px; min-width: 96px;
      backdrop-filter: blur(10px); box-shadow: var(--shadow);
    }
    #kpi .k span { display: block; font-size: 11px; color: var(--muted); }
    #kpi .k b { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    #kpi .k b i { font-size: 12px; font-weight: 600; color: var(--muted); font-style: normal; margin-left: 2px; }

    /* 하단 안내 + 범례 */
    .footer {
      position: fixed; bottom: 0; left: 0; right: 0; padding: 18px 28px;
      display: flex; justify-content: space-between; align-items: flex-end;
      pointer-events: none; z-index: 10; gap: 20px; flex-wrap: wrap;
    }
    .hint { color: var(--muted); font-size: 12.5px; line-height: 1.6; }
    .hint b { color: var(--fg); font-weight: 600; }
    .legend {
      display: flex; gap: 14px; background: var(--card); border: 1px solid var(--line);
      border-radius: 12px; padding: 9px 14px; backdrop-filter: blur(10px); pointer-events: auto; box-shadow: var(--shadow);
    }
    .legend .item { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--muted); }
    .legend .sw { width: 11px; height: 11px; border-radius: 3px; }

    /* 3D 라벨 */
    .bar-label {
      text-align: center; pointer-events: none; user-select: none;
      transform: translateY(-6px);
    }
    .bar-label b { display: block; font-size: 13px; font-weight: 700; color: var(--fg); text-shadow: 0 1px 3px rgba(255,255,255,0.9); }
    .bar-label span { font-size: 10.5px; color: var(--muted); text-shadow: 0 1px 3px rgba(255,255,255,0.9); }

    /* 상세 패널 */
    #detail {
      position: fixed; top: 50%; right: 28px; transform: translateY(-50%) translateX(120%);
      width: 320px; background: var(--card); border: 1px solid var(--line);
      border-radius: 18px; padding: 22px; backdrop-filter: blur(16px);
      box-shadow: 0 20px 50px rgba(20,30,50,0.16); z-index: 20;
      transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1); opacity: 0;
    }
    #detail.open { transform: translateY(-50%) translateX(0); opacity: 1; }
    #detail .close {
      position: absolute; top: 16px; right: 16px; background: transparent; border: 0;
      color: var(--muted); font-size: 16px; cursor: pointer; line-height: 1;
    }
    #detail .close:hover { color: var(--fg); }
    #detail .dot { width: 32px; height: 32px; border-radius: 9px; margin-bottom: 12px; box-shadow: 0 0 20px currentColor; }
    #detail h2 { font-size: 19px; font-weight: 800; letter-spacing: -0.5px; }
    #detail .note { color: var(--muted); font-size: 12.5px; line-height: 1.55; margin: 8px 0 16px; }
    #detail .table { font-size: 13.5px; }
    #detail .row { display: flex; justify-content: space-between; padding: 7px 0; }
    #detail .row span { color: var(--muted); }
    #detail .row b { font-weight: 700; }
    #detail .row b.pos { color: var(--pos); }
    #detail .row b.neg { color: var(--neg); }
    #detail .rule { height: 1px; background: var(--line); margin: 6px 0; }
    .spark-wrap { margin-top: 16px; }
    .spark-wrap.pos { color: var(--pos); } .spark-wrap.neg { color: var(--neg); }
    .spark-head { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .spark { width: 100%; height: 46px; display: block; }

    /* 로딩 */
    #loading {
      position: fixed; inset: 0; display: grid; place-items: center;
      background: var(--bg); z-index: 100; color: var(--muted); font-size: 14px;
    }
    #loading .spin {
      width: 26px; height: 26px; border: 3px solid var(--line); border-top-color: #5b8cff;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      #kpi { display: none; }
      #detail { right: 12px; left: 12px; width: auto; }
      .footer { padding: 14px; }
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three.module.js",
      "three/addons/": "./vendor/addons/"
    }
  }
  </script>
</head>
<body>
  <div id="loading"><div><div class="spin"></div>aicrea 3D 대시보드 로딩 중…</div></div>
  <div id="stage"></div>

  <header class="topbar">
    <div class="brand">
      <h1><span class="mark"></span>aicrea</h1>
      <p>매출채널별 손익 · FY2025 (가상 데이터, 단위 억원)</p>
    </div>
    <div id="kpi"></div>
  </header>

  <aside id="detail"></aside>

  <footer class="footer">
    <div class="hint">
      <b>드래그</b>로 회전 · <b>휠</b>로 확대/축소 · 막대 <b>클릭</b>으로 상세 손익 보기<br />
      투명 기둥 = 매출 규모 · 내부 막대 = 영업이익 (지면 아래는 영업손실)
    </div>
    <div class="legend">
      <div class="item"><span class="sw" style="background:#e5484d"></span>손실</div>
      <div class="item"><span class="sw" style="background:#e0a020"></span>저마진</div>
      <div class="item"><span class="sw" style="background:#4caf6e"></span>양호</div>
      <div class="item"><span class="sw" style="background:#1f9d57"></span>고마진</div>
    </div>
  </footer>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
