<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#4aa3e0" />
  <title>유통기한 관리</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <button type="button" id="settings-btn" class="settings-btn" title="설정">⚙️</button>
    <h1>🥫 유통기한 관리</h1>
    <p class="sub">모든 데이터는 이 기기에만 저장됩니다</p>
  </header>

  <section id="settings" class="settings-panel hidden">
    <h2>설정</h2>
    <label class="field">
      <span>식약처 식품안전나라 API 키</span>
      <input type="text" id="api-key" placeholder="발급받은 인증키 붙여넣기" autocomplete="off" />
    </label>
    <p class="hint left">키는 이 기기(브라우저)에만 저장됩니다. 국내 가공식품 제품명 조회 시, 키와 바코드가 공개 중계 서버를 거쳐 식약처 API로 전달됩니다.</p>
    <label class="field">
      <span>CLOVA OCR 프록시 URL (선택)</span>
      <input type="text" id="clova-url" placeholder="예: https://your-worker.workers.dev" autocomplete="off" />
    </label>
    <p class="hint left">입력하면 라벨 OCR이 네이버 CLOVA(고정확도)로 동작합니다. 비우면 기기 내 로컬 OCR을 사용합니다. (Cloudflare Worker 설정법은 README 참고)</p>
    <div class="form-actions">
      <button type="button" id="settings-save" class="btn primary">저장</button>
      <button type="button" id="settings-close" class="btn secondary">닫기</button>
    </div>
  </section>

  <nav class="tabs">
    <button class="tab active" data-tab="list">목록</button>
    <button class="tab" data-tab="add">추가</button>
  </nav>

  <!-- 목록 화면 -->
  <main id="view-list" class="view active">
    <div class="toolbar">
      <input type="search" id="search" placeholder="이름/바코드 검색" />
      <select id="sort">
        <option value="expiry">유통기한 임박순</option>
        <option value="purchase">최근 구매순</option>
        <option value="name">이름순</option>
      </select>
    </div>
    <div id="summary" class="summary"></div>
    <ul id="items" class="items"></ul>
    <p id="empty" class="empty">저장된 항목이 없습니다. "추가" 탭에서 등록하세요.</p>
  </main>

  <!-- 추가 화면 -->
  <main id="view-add" class="view">
    <form id="form" class="form">
      <input type="hidden" id="item-id" />

      <label class="field">
        <span>바코드 / 문자열</span>
        <div class="row">
          <input type="text" id="barcode" placeholder="바코드 또는 제품명 입력" />
          <button type="button" id="scan-btn" class="btn secondary">📷 스캔</button>
        </div>
        <p class="hint left">GS1 코드는 유통기한 자동 입력, 일반 바코드는 온라인 제품명 조회를 시도합니다.</p>
      </label>

      <div id="scanner" class="scanner hidden">
        <video id="video" playsinline muted></video>
        <div class="scan-line"></div>
        <button type="button" id="scan-stop" class="btn secondary small">스캔 중지</button>
        <p id="scan-hint" class="hint"></p>
      </div>

      <label class="field">
        <span>라벨 글자 인식 (OCR)</span>
        <button type="button" id="ocr-btn" class="btn secondary">🔤 라벨 촬영해서 제품명·유통기한 읽기</button>
        <input type="file" id="ocr-file" accept="image/*" capture="environment" class="hidden" />
        <p id="ocr-status" class="hint left hidden"></p>
        <div id="ocr-result" class="ocr-result hidden"></div>
      </label>

      <label class="field">
        <span>제품명</span>
        <input type="text" id="name" placeholder="예: 우유 1L" required />
      </label>

      <label class="field">
        <span>유통기한</span>
        <input type="date" id="expiry" required />
      </label>

      <div class="grid2">
        <label class="field">
          <span>수량</span>
          <input type="number" id="quantity" min="1" step="1" value="1" required />
        </label>
        <label class="field">
          <span>구매일자</span>
          <input type="date" id="purchase" required />
        </label>
      </div>

      <label class="field">
        <span>사진</span>
        <input type="file" id="photo" accept="image/*" capture="environment" />
      </label>
      <div id="photo-preview" class="photo-preview hidden">
        <img id="photo-img" alt="미리보기" />
        <button type="button" id="photo-remove" class="btn secondary small">사진 제거</button>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn primary" id="save-btn">저장</button>
        <button type="button" class="btn secondary" id="cancel-btn">취소</button>
      </div>
    </form>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
